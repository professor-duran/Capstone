name: Build LaTeX PDFs

on:
  push:
    branches: [ main ]
    paths:
      - '**.tex'
      - 'mrd/**'
      - 'student_guide/**'
      - 'pa_guide/**'
      - '.github/workflows/build-pdfs.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build Course Text
        uses: xu-cheng/latex-action@v3
        with:
          working_directory: mrd
          root_file: main.tex
          args: -pdf -f -interaction=nonstopmode -file-line-error

      - name: Build Student Guide
        uses: xu-cheng/latex-action@v3
        with:
          working_directory: student_guide
          root_file: EDNS491_Student_Guide.tex
          args: -pdf -f -interaction=nonstopmode -file-line-error

      - name: Build PA Instructors Guide
        uses: xu-cheng/latex-action@v3
        with:
          working_directory: pa_guide
          root_file: PA_Instructors_Guide.tex
          args: -pdf -f -interaction=nonstopmode -file-line-error

      - name: Verify build outputs
        run: |
          echo "=== Build output check ==="
          for f in mrd/main.pdf student_guide/EDNS491_Student_Guide.pdf pa_guide/PA_Instructors_Guide.pdf; do
            if [ -f "$f" ]; then
              echo "OK: $f ($(stat -c%s "$f") bytes)"
            else
              echo "MISSING: $f"
              # Show the log to diagnose
              logdir=$(dirname "$f")
              logfile=$(basename "$f" .pdf).log
              if [ -f "$logdir/$logfile" ]; then
                echo "--- Last 40 lines of $logdir/$logfile ---"
                tail -40 "$logdir/$logfile"
              fi
            fi
          done

      - name: Copy PDFs to repo root
        run: |
          cp mrd/main.pdf edns491_course_text.pdf
          cp student_guide/EDNS491_Student_Guide.pdf EDNS491_Student_Guide.pdf
          cp pa_guide/PA_Instructors_Guide.pdf PA_Instructors_Guide.pdf

      - name: Commit PDFs
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add -f edns491_course_text.pdf EDNS491_Student_Guide.pdf PA_Instructors_Guide.pdf
          git diff --staged --quiet || {
            git commit -m "Auto-build PDFs [skip ci]"
            git pull --rebase origin main
            git push
          }
