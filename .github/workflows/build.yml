name: Build LaTeX PDFs

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Install LaTeX
      run: |
        sudo apt-get update
        sudo apt-get install -y texlive-full

    - name: Build Course Text
      run: |
        cd ${{ github.workspace }}
        pdflatex -interaction=nonstopmode main.tex
        pdflatex -interaction=nonstopmode main.tex
        pdflatex -interaction=nonstopmode main.tex

    - name: Build Student Guide
      run: |
        cd ${{ github.workspace }}
        pdflatex -interaction=nonstopmode student_guide.tex
        pdflatex -interaction=nonstopmode student_guide.tex
        pdflatex -interaction=nonstopmode student_guide.tex

    - name: Verify build
      run: |
        test -f main.pdf && echo "Course Text: OK ($(du -h main.pdf | cut -f1))" || exit 1
        test -f student_guide.pdf && echo "Student Guide: OK ($(du -h student_guide.pdf | cut -f1))" || exit 1

    - name: Upload PDFs as artifacts
      uses: actions/upload-artifact@v4
      with:
        name: EDNS491-492-PDFs
        path: |
          main.pdf
          student_guide.pdf
        retention-days: 90
