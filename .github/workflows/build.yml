name: Build LaTeX PDFs

on:
  push:
    branches: [ main ]
    paths:
      - '**.tex'
      - 'frontmatter/**'
      - 'chapters/**'
      - 'appendices/**'
      - '.github/workflows/build.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build Course Text
        uses: xu-cheng/latex-action@v3
        with:
          root_file: main.tex
          args: -pdf -interaction=nonstopmode -file-line-error
          extra_packages: tcolorbox etoolbox pgf environ tikzfill pdfcol

      - name: Build Student Guide
        if: hashFiles('student_guide.tex') != ''
        uses: xu-cheng/latex-action@v3
        with:
          root_file: student_guide.tex
          args: -pdf -interaction=nonstopmode -file-line-error
          extra_packages: tcolorbox etoolbox pgf environ tikzfill pdfcol

      - name: Commit PDFs
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add -f main.pdf
          if [ -f student_guide.pdf ]; then
            git add -f student_guide.pdf
          fi
          git diff --staged --quiet || {
            git commit -m "Auto-build PDFs [skip ci]"
            git pull --rebase origin main
            git push
          }
